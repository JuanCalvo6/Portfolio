<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Document</title>
</head>
<body>
    <h1>Nuestras habilidades</h1>
    <p th:if="${skills.isEmpty()}"> No hay datos </p>
    <ul th:if="${!skills.isEmpty()}">
        <li th:each="skill : ${skills}" th:text="'Habilidad: ' + ${skill.name} + ' Nivel: ' + ${skill.level}" ></li>
    </ul>
    <form action="/skills" method="get">
        <label th:for="nombre">Buscar:</label>
        <input type="text" th:value="${filter}" name="filter">
        <button type="submit">Guardar</button>
    </form>
</body>
</html>
